<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QLTK — TienTool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <!-- ═══ TITLEBAR ═══ -->
    <div class="drag-region flex items-center justify-between h-[34px] bg-surface-dark border-b border-white/[0.06] shrink-0 z-50">
      <div class="flex items-center gap-2 pl-3">
        <span class="text-sm">🎮</span>
        <span class="text-xs font-semibold text-gray-400 tracking-wide">QLTK — TienTool</span>
      </div>
      <div class="no-drag flex">
        <button id="btn-minimize" class="w-11 h-[34px] flex items-center justify-center text-gray-400 hover:bg-white/[0.08] hover:text-white transition-colors" title="Thu nhỏ">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="2" fill="currentColor"/></svg>
        </button>
        <button id="btn-maximize" class="w-11 h-[34px] flex items-center justify-center text-gray-400 hover:bg-white/[0.08] hover:text-white transition-colors" title="Phóng to">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button id="btn-close" class="w-11 h-[34px] flex items-center justify-center text-gray-400 hover:bg-red-500 hover:text-white transition-colors" title="Đóng">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>

    <!-- ═══ APP ═══ -->
    <div id="app" class="flex-1 overflow-hidden">

      <!-- ── LOGIN PAGE ── -->
      <div id="page-login" class="page active hidden h-full">
        <div class="w-full h-full flex flex-col items-center justify-center gap-8"
             style="background: radial-gradient(ellipse at 30% 20%, rgba(74,144,217,0.1) 0%, transparent 60%), #0d1b2a;">

          <div class="text-center">
            <div class="text-5xl mb-3 animate-float">🎯</div>
            <h1 class="text-3xl font-extrabold bg-gradient-to-r from-brand-400 to-blue-300 bg-clip-text text-transparent">TienTool</h1>
            <p class="text-gray-400 text-sm mt-1">Quản lý tài khoản Gunny 2017</p>
          </div>

          <form id="login-form" class="w-[340px] flex flex-col gap-3.5 p-6 bg-surface border border-white/[0.06] rounded-xl shadow-lg">
            <div class="flex flex-col gap-1.5">
              <label for="input-key" class="text-[11px] font-semibold uppercase tracking-wider text-gray-400">License Key</label>
              <input
                type="text" id="input-key"
                class="w-full px-3 py-2.5 bg-surface-dark border border-white/[0.08] rounded-md text-gray-200 text-sm outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-400/25 transition-all"
                placeholder="Nhập key bản quyền..." autocomplete="off" spellcheck="false" />
            </div>
            <button type="submit" id="btn-login"
                    class="w-full py-2.5 bg-brand-400 hover:bg-brand-300 text-white font-semibold text-sm rounded-md transition-all flex items-center justify-center gap-2">
              <span class="btn-text">Đăng nhập</span>
              <span class="btn-loader hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spinner"></span>
            </button>
            <p id="login-error" class="text-red-400 text-xs text-center min-h-[16px]"></p>
          </form>
        </div>
      </div>

      <!-- ── DASHBOARD PAGE ── -->
      <div id="page-dashboard" class="page hidden h-full">
        <div class="flex h-full w-full">

          <!-- LEFT: Account Table -->
          <div class="w-[340px] shrink-0 flex flex-col bg-surface border-r border-white/[0.06]">
            <!-- Header -->
            <div class="flex items-center justify-between px-3 py-2 border-b border-white/[0.06]">
              <span id="account-count" class="text-xs font-semibold text-gray-400">Danh sách tài khoản</span>
              <button id="btn-logout" class="no-drag flex items-center gap-1 text-[11px] text-gray-500 hover:text-gray-200 transition-colors" title="Đăng xuất">
                <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Thoát
              </button>
            </div>
            <!-- Table -->
            <div class="flex-1 overflow-y-auto scrollbar-thin">
              <table class="data-table w-full border-collapse">
                <thead>
                  <tr>
                    <th class="sticky top-0 bg-surface-dark px-2 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-gray-500 text-left border-b border-white/[0.06] w-6"></th>
                    <th class="sticky top-0 bg-surface-dark px-2 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-gray-500 text-left border-b border-white/[0.06]">Tài Khoản</th>
                    <th class="sticky top-0 bg-surface-dark px-2 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-gray-500 text-left border-b border-white/[0.06] w-14">Server</th>
                    <th class="sticky top-0 bg-surface-dark px-2 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-gray-500 text-left border-b border-white/[0.06]">Note</th>
                    <th class="sticky top-0 bg-surface-dark px-2 py-1.5 text-[10px] font-semibold uppercase tracking-wider text-gray-500 text-left border-b border-white/[0.06] w-10">Type</th>
                  </tr>
                </thead>
                <tbody id="accounts-tbody">
                  <tr><td colspan="5" class="text-center py-10 text-gray-500 text-sm">Đang tải...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- RIGHT: Detail + Actions -->
          <div class="flex-1 flex flex-col gap-3 p-4 overflow-y-auto scrollbar-thin"
               style="background: radial-gradient(ellipse at 80% 10%, rgba(74,144,217,0.04) 0%, transparent 50%), #0d1b2a;">

            <!-- Form Fields -->
            <div class="flex flex-col gap-2.5">
              <div class="flex items-center gap-2">
                <label class="w-20 shrink-0 text-right text-sm font-semibold text-blue-200/70">Tài khoản :</label>
                <input type="text" id="form-username"
                       class="flex-1 px-3 py-1.5 bg-surface-dark border border-white/10 rounded-md text-sm text-gray-200 outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 transition-all"
                       spellcheck="false" />
              </div>
              <div class="flex items-center gap-2">
                <label class="w-20 shrink-0 text-right text-sm font-semibold text-blue-200/70">Mật khẩu :</label>
                <div class="flex-1 relative">
                  <input type="password" id="form-password"
                         class="w-full px-3 py-1.5 pr-9 bg-surface-dark border border-white/10 rounded-md text-sm text-gray-200 outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 transition-all"
                         spellcheck="false" />
                  <button type="button" id="toggle-pass"
                          class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-200 transition-colors">
                    <i data-lucide="eye" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <label class="w-20 shrink-0 text-right text-sm font-semibold text-blue-200/70">Server :</label>
                <select id="form-server"
                        class="flex-1 px-3 py-1.5 bg-surface-dark border border-white/10 rounded-md text-sm text-gray-200 outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 transition-all cursor-pointer">
                  <option value="">-- Chọn server --</option>
                </select>
              </div>
              <div class="flex items-center gap-2">
                <label class="w-20 shrink-0 text-right text-sm font-semibold text-blue-200/70">Note :</label>
                <input type="text" id="form-note"
                       class="flex-1 px-3 py-1.5 bg-surface-dark border border-white/10 rounded-md text-sm text-gray-200 outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 transition-all"
                       spellcheck="false" />
              </div>
              <input type="hidden" id="form-id" />
              <input type="hidden" id="form-accountType" value="0" />
            </div>

            <!-- CRUD Buttons -->
            <div class="grid grid-cols-2 gap-2">
              <button id="btn-add" class="flex items-center justify-center gap-1.5 px-3 py-2 bg-surface border border-white/10 hover:border-brand-400/40 hover:bg-surface-card text-sm text-gray-200 rounded-md transition-all">
                <i data-lucide="plus-circle" class="w-4 h-4 text-green-400"></i> Thêm (acc chính)
              </button>
              <button id="btn-edit" class="flex items-center justify-center gap-1.5 px-3 py-2 bg-surface border border-white/10 hover:border-brand-400/40 hover:bg-surface-card text-sm text-gray-200 rounded-md transition-all">
                <i data-lucide="pencil" class="w-4 h-4 text-brand-300"></i> Sửa
              </button>
              <button id="btn-add-clone" class="flex items-center justify-center gap-1.5 px-3 py-2 bg-surface border border-white/10 hover:border-brand-400/40 hover:bg-surface-card text-sm text-gray-200 rounded-md transition-all">
                <i data-lucide="copy-plus" class="w-4 h-4 text-yellow-400"></i> Thêm (acc clone)
              </button>
              <button id="btn-delete" class="flex items-center justify-center gap-1.5 px-3 py-2 bg-surface border border-red-500/20 hover:border-red-500/50 hover:bg-red-500/10 text-sm text-red-300 rounded-md transition-all">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Xóa
              </button>
            </div>

            <!-- Login Launcher -->
            <button id="btn-login-launcher"
                    class="w-full py-2.5 bg-gradient-to-r from-brand-400 to-brand-500 hover:from-brand-300 hover:to-brand-400 text-white font-semibold text-sm rounded-md shadow-lg shadow-brand-400/20 hover:shadow-brand-400/30 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
              <i data-lucide="rocket" class="w-4 h-4"></i> Login Launcher
            </button>

            <!-- Flash -->
            <div class="flex flex-col gap-1.5">
              <span class="text-[10px] font-bold uppercase tracking-widest text-gray-600 border-b border-white/[0.06] pb-1">Flash</span>
              <div class="grid grid-cols-3 gap-2">
                <button id="btn-flash-login" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                  <i data-lucide="log-in" class="w-3.5 h-3.5"></i> Login
                </button>
                <button id="btn-sort" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                  <i data-lucide="arrow-up-down" class="w-3.5 h-3.5"></i> Sắp xếp
                </button>
                <button id="btn-kill-all" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-red-500/30 hover:bg-red-500/10 text-xs text-gray-300 rounded-md transition-all">
                  <i data-lucide="skull" class="w-3.5 h-3.5"></i> Kill All
                </button>
              </div>
            </div>

            <!-- Debug -->
            <div class="flex flex-col gap-1.5">
              <span class="text-[10px] font-bold uppercase tracking-widest text-gray-600 border-b border-white/[0.06] pb-1">Debug</span>
              <div class="grid grid-cols-3 gap-2">
                <button id="btn-clipboard" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                  <i data-lucide="clipboard-copy" class="w-3.5 h-3.5"></i> Clipboard
                </button>
                <button id="btn-log" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                  <i data-lucide="file-text" class="w-3.5 h-3.5"></i> Log
                </button>
                <button id="btn-config" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                  <i data-lucide="settings" class="w-3.5 h-3.5"></i> Config
                </button>
              </div>
            </div>

            <!-- Import / Export -->
            <div class="grid grid-cols-3 gap-2">
              <button id="btn-import-json" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="upload" class="w-3.5 h-3.5"></i> Import JSON
              </button>
              <button id="btn-export-json" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="download" class="w-3.5 h-3.5"></i> Export JSON
              </button>
              <button id="btn-export-txt" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="file-down" class="w-3.5 h-3.5"></i> Export TXT
              </button>
            </div>

            <!-- Progress Status -->
            <div id="auto-progress-container" class="hidden mt-auto p-3 bg-surface-dark/50 border border-brand-400/20 rounded-lg animate-fade-in">
              <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                  <span id="auto-progress-acc" class="text-[10px] font-bold text-brand-300 uppercase">Acc: 0/0</span>
                  <span id="auto-progress-code" class="text-[10px] font-bold text-blue-300 uppercase">Code: 0/0</span>
                </div>
                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                  <div id="auto-progress-bar" class="h-full bg-brand-400 transition-all duration-300" style="width: 0%"></div>
                </div>
                <div id="auto-progress-msg" class="text-[11px] text-gray-400 truncate">Sẵn sàng...</div>
              </div>
            </div>

            <!-- Bottom row -->
            <div class="grid grid-cols-3 gap-2">
              <button id="btn-script-auto" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="bot" class="w-3.5 h-3.5"></i> Script Auto
              </button>
              <button id="btn-code-tuan" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="calendar" class="w-3.5 h-3.5"></i> Code tuần
              </button>
              <button id="btn-nhan-all-code" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="gift" class="w-3.5 h-3.5"></i> Nhận all code
              </button>
            </div>

            <div class="grid grid-cols-3 gap-2">
              <button id="btn-arrange-launcher" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> Sắp xếp Launcher 
              </button>
              <!-- <button id="btn-code-tuan" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="calendar" class="w-3.5 h-3.5"></i> Code tuần
              </button>
              <button id="btn-nhan-all-code" class="flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="gift" class="w-3.5 h-3.5"></i> Nhận all code
              </button> -->
            </div>

            <!-- <div class="">
              <button id="btn-open-webshop" class="w-full flex items-center justify-center gap-1 px-2 py-1.5 bg-surface border border-white/10 hover:border-brand-400/30 hover:bg-surface-card text-xs text-gray-300 rounded-md transition-all">
                <i data-lucide="shopping-cart" class="w-3.5 h-3.5"></i> Mở webshop
              </button>
            </div> -->

          </div>
        </div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 flex flex-col gap-1.5 z-[3000]"></div>

    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
